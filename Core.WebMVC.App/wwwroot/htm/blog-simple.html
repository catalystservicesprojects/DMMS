<style>
    /* ---------------- GLOBAL SAFETY ---------------- */
    html, body {
        max-width: 100%;

        background: #f4f6f8;

    @media (max-width:900px) {

        }

    /* ---------------- SLIDER ---------------- */

    .slider-container {
        position: relative;
        width: 100%;
        height: fit-content;
        max-width: 100%;
        aspect-ratio: 10/14;
        overflow: hidden;
        border-radius: 14px;
        background: white;
        box-shadow: 0 8px 28px rgba(0,0,0,0.15);
    }

    .slide {
        position: absolute;
        width: 100%;
        height: fit-content;
        opacity: 0;
        transition: opacity .8s ease;
    }

        .slide.active {
            opacity: 1;
            z-index: 1;
        }

        .slide img {
            width: 100%;
            height: max-content;
            object-fit: contain;
            background: linear-gradient(180deg,#f6f7f9,#e9edf3);

    /* ---------------- SLIDER BUTTONS ---------------- */

        border: none;
        color: #fff;
        font-size: 26px;
        opacity: 1;
        padding: 4px 17px;
        border-radius: 50%;
        cursor: pointer;
        backdrop-filter: blur(6px);
        transition: .25s;
    }

        .nav-btn:hover {
            background: rgba(0,0,0,0.75);
        }

    .prev {
        left: 15px;
    }

    .next {
        right: 15px;
    }

    /* ---------------- THUMBNAILS ---------------- */

    .thumbnail-container {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 12px;
    }

        .thumbnail-container img {
            width: 70px;
            height: 85px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            opacity: .85;
            transition: .25s;
        }

            .thumbnail-container img:hover {
                transform: scale(1.08);
                opacity: 1;
            }

            .thumbnail-container img.active-thumb {
                border-color: #0073e6;
                transform: scale(1.1);
                opacity: 1;
            }

    /* ---------------- AFFILIATE BUTTONS ---------------- */

    .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
    }

    .affiliate-btn {
        flex: 1 1 calc(50% - 12px);
        background: linear-gradient(135deg,#6c757d,#2d3338);
        color: #fff;
        padding: 14px 20px;
        border-radius: 12px;
        font-weight: 600;
        text-decoration: none;
        text-align: center;
        box-shadow: 0 6px 18px rgba(0,0,0,0.25);
        transition: .25s;
    }

        .affiliate-btn:hover {
            transform: translateY(-4px);
            background: #0056b3;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
        }

    @media (max-width:600px) {
        .affiliate-btn {
            flex: 1 1 100%;
        }
    }

    /* ---------------- BLOG SECTION ---------------- */

    .blog-section {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr;
        gap: 25px;
        margin-top: 30px;
        background: #fff;
        border-radius: 14px;
        padding: 25px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

        .blog-section article {

            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

    /* ---------------- ARTICLE & PRODUCT GRID ---------------- */
    .article-section {

    }

    .product-section {

    }

    div.gallery {

    * {

        padding: 0 6px;
        float: left;

    }

    .clearfix:after {
        content: "";
        display: table;
        clear: both;
    }

    .responsive {
        padding: 10px;
        float: left;
        width: 25%;

    /* Mobile responsive */

    }

        .responsive {

    /* ---------------- CARD STYLE ---------------- */
    .gallery {
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0px 3px 12px rgba(0,0,0,0.15);

        font-weight: 600;
        color: #333;

        text-overflow: ellipsis;
    }

    /* ---------------- CLEARFIX SAFETY ---------------- */

    .clearfix::after {
        content: "";
        display: block;
        /*clear: both;*/
    }

<script>
    const slides = document.querySelectorAll('.slide');
    const thumbs = document.querySelectorAll('.thumbnail-container img');
    let currentIndex = 0;
    let slideInterval;

    function showSlide(index) {
        slides.forEach((slide, i) => slide.classList.toggle('active', i === index));
        thumbs.forEach((thumb, i) => thumb.classList.toggle('active-thumb', i === index));
        currentIndex = index;
    }

    function nextSlide() {
        const nextIndex = (currentIndex + 1) % slides.length;
        showSlide(nextIndex);
    }

    function prevSlide() {
        const prevIndex = (currentIndex - 1 + slides.length) % slides.length;
        showSlide(prevIndex);
    }

    function startAutoSlide() {
        slideInterval = setInterval(nextSlide, 4000);
    }

    function stopAutoSlide() {
        clearInterval(slideInterval);
    }

    document.querySelector('.next').addEventListener('click', () => {
        nextSlide();
        stopAutoSlide();
        startAutoSlide();
    });

    document.querySelector('.prev').addEventListener('click', () => {
        prevSlide();
        stopAutoSlide();
        startAutoSlide();
    });

    thumbs.forEach((thumb, i) => {
        thumb.addEventListener('click', () => {
            showSlide(i);
            stopAutoSlide();
            startAutoSlide();
        });
    });

    startAutoSlide();
</script>
