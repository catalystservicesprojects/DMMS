<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
    }

    /* --- MAIN GRID LAYOUT --- */
    .main-container {
        display: grid;
        grid-template-columns: 2fr 1fr;
        grid-template-rows: auto auto;
        gap: 20px;
        padding: 20px;
    }

    .slideshow-section {
        grid-column: 1;
        grid-row: 1;
    }

    .info-section {
        grid-column: 2;
        grid-row: 1;
        width: 600px;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
    }

    .blog-section {
        grid-column: 1 / span 2;
        grid-row: 2;
        background: #fff;
        /*            padding: 20px;*/
        border-radius: 10px;
    }

    /* --- SLIDESHOW STYLES --- */
    .slider-container {
        position: relative;
        width: 100%;
        height: 800px;
        overflow: hidden;
        border-radius: 10px;
        background: #000;
    }

    /* Tablets (max-width: 1024px) */
    @media (max-width: 1024px) {
        .slider-container {
            height: 800px;
        }
    }

    /* Large Mobile (max-width: 768px) */
    @media (max-width: 768px) {
        .slider-container {
            height: 800px;
        }
    }

    /* Small Mobile (max-width: 480px) */
    @media (max-width: 480px) {
        .slider-container {
            height: 450px;
        }
    }

    /* Extra Small Mobile (max-width: 360px) */
    @media (max-width: 360px) {
        .slider-container {
            height: 250px;
        }
    }

    .slide {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.8s ease-in-out;
    }

        .slide.active {
            opacity: 1;
            z-index: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            /*object-fit: cover;*/
        }

    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background-color: rgba(0,0,0,0.5);
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        padding: 8px 15px;
        border-radius: 50%;
        z-index: 10;
    }

        .nav-btn:hover {
            background-color: rgba(0,0,0,0.8);
        }

    .prev {
        left: 15px;
    }

    .next {
        right: 15px;
    }

    /* --- Thumbnail Navigation --- */
    .thumbnail-container {
        display: flex;
        justify-content: left;
        gap: 10px;
        margin-top: 10px;
    }

    .thumbnail-container img {
        width: 70px;
        height: 90px;
        object-fit: cover;
        border-radius: 6px;
        cursor: pointer;
        opacity: 0.6;
        transition: opacity 0.3s, transform 0.3s;
        border: 2px solid transparent;
    }

    .thumbnail-container img.active-thumb {
        opacity: 1;
        transform: scale(1.05);
        border-color: #0073e6;
    }

    /* --- INFO SECTION --- */
    .info-section h2 {
        margin-top: 0;
        color: #333;
    }

    .info-section p {
        line-height: 1.6;
        color: #555;
    }

    /* --- BLOG SECTION --- */
    .blog-section h2 {
        margin-top: 0;
        color: #333;
    }

    .blog-section article {
        margin-bottom: 15px;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
    }

    /* --- RESPONSIVE DESIGN --- */
    @media (max-width: 900px) {
        .main-container {
            grid-template-columns: 1fr;
        }

        .slideshow-section, .info-section, .blog-section {
            grid-column: 1;
        }
    }

    .thumbnail-container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
    }

    .thumbnail-container img {
        width: 70px;
        height: 90px;
        object-fit: cover;
        border-radius: 6px;
        cursor: pointer;
        opacity: 0.9;
        transition: opacity 0.3s, transform 0.3s, border-color 0.3s;
        border: 2px solid #ccc; /* 👈 visible border for all thumbnails */
    }

    .thumbnail-container img:hover {
        opacity: 1;
        transform: scale(1.05);
    }

    .thumbnail-container img.active-thumb {
        border-color: #0073e6; /* 👈 highlight active thumbnail */
        transform: scale(1.08);
        opacity: 1;
    }
</style>

<script>
    const slides = document.querySelectorAll('.slide');
    const thumbs = document.querySelectorAll('.thumbnail-container img');
    let currentIndex = 0;
    let slideInterval;

    function showSlide(index) {
        slides.forEach((slide, i) => slide.classList.toggle('active', i === index));
        thumbs.forEach((thumb, i) => thumb.classList.toggle('active-thumb', i === index));
        currentIndex = index;
    }

    function nextSlide() {
        const nextIndex = (currentIndex + 1) % slides.length;
        showSlide(nextIndex);
    }

    function prevSlide() {
        const prevIndex = (currentIndex - 1 + slides.length) % slides.length;
        showSlide(prevIndex);
    }

    function startAutoSlide() {
        slideInterval = setInterval(nextSlide, 4000);
    }

    function stopAutoSlide() {
        clearInterval(slideInterval);
    }

    document.querySelector('.next').addEventListener('click', () => {
        nextSlide();
        stopAutoSlide();
        startAutoSlide();
    });

    document.querySelector('.prev').addEventListener('click', () => {
        prevSlide();
        stopAutoSlide();
        startAutoSlide();
    });

    thumbs.forEach((thumb, i) => {
        thumb.addEventListener('click', () => {
            showSlide(i);
            stopAutoSlide();
            startAutoSlide();
        });
    });

    startAutoSlide();
</script>
