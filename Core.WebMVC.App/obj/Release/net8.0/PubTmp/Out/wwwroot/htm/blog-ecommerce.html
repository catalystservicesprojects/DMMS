<style>
    :root {
        --primary: #0073e6;
        --dark: #222;
        --light: #f5f5f5;
        --card: #fff;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0
    }

    body {
        font-family: Arial,sans-serif;
        background: var(--light);
        color: var(--dark);
        line-height: 1.6
    }

    /* MAIN LAYOUT */
    .container {
        max-width: 1300px;
        margin: auto;
        padding: 24px;
    }

    /* HERO SECTION */
    .hero-section {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 30px;
        margin-bottom: 40px;
    }

    @media(max-width:992px) {
        .hero-section {
            grid-template-columns: 1fr
        }
    }

    /* SLIDER */
    .slider-container {
        position: relative;
        width: 100%;
        aspect-ratio: 4/5;
        border-radius: 16px;
        overflow: hidden;
        background: #000;
    }

    .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: .5s;
    }

        .slide.active {
            opacity: 1
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: none;
        background: rgba(0,0,0,.6);
        color: #fff;
        cursor: pointer;
    }

    .prev {
        left: 10px
    }

    .next {
        right: 10px
    }

    /* RIGHT PANEL */
    .hero-right {
        background: var(--card);
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 5px 20px rgba(0,0,0,.08);
    }

    .rating {
        font-size: 14px;
        margin-bottom: 12px;
        color: #ff9900
    }

    .short-benefits {
        margin: 15px 0
    }

    .price-box {
        margin: 20px 0;
    }

    .current-price {
        font-size: 26px;
        font-weight: 700;
        color: var(--primary)
    }

    .old-price {
        text-decoration: line-through;
        margin-left: 10px;
        color: #888
    }

    .discount {
        margin-left: 10px;
        color: green;
        font-weight: 600
    }

    /* BUTTONS */
    .button-row {
        display: grid;
        gap: 12px;
    }

    .affiliate-btn {
        background: linear-gradient(135deg,#2c3e50,#000);
        color: #fff;
        padding: 14px;
        text-align: center;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        transition: .3s;
    }

        .affiliate-btn:hover {
            background: var(--primary)
        }

    .trust-badges {
        margin-top: 20px;
        font-size: 14px;
        color: #555;
    }

    /* TABLE */
    .specs-section {
        background: var(--card);
        padding: 30px;
        border-radius: 16px;
        margin-bottom: 40px;
    }

    .spec-table {
        width: 100%;
        border-collapse: collapse;
    }

        .spec-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

    /* CONTENT */
    .content-section {
        background: var(--card);
        padding: 30px;
        border-radius: 16px;
        margin-bottom: 40px;
    }

        .content-section h2 {
            margin: 20px 0 10px
        }

        .content-section h3 {
            margin: 15px 0 5px
        }

    /* FAQ */
    .faq-section {
        background: var(--card);
        padding: 30px;
        border-radius: 16px;
        margin-bottom: 40px;
    }

    .faq-item {
        margin-bottom: 20px
    }

    /* GRID SECTIONS */
    .grid-section {
        display: grid;
        grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
        gap: 20px;
        margin-bottom: 50px;
    }

    .card {
        background: var(--card);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,.08);
        transition: .3s;
    }

        .card:hover {
            transform: translateY(-5px)
        }

        .card img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: fill;
            height: 350px;
            padding: 5px;
        }

        .card .desc {
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const slides = document.querySelectorAll('.slide');
        let current = 0;
        function show(i) {
            slides.forEach((s, index) => s.classList.toggle('active', index === i));
            current = i;
        }
        document.querySelector('.next').onclick = () => show((current + 1) % slides.length);
        document.querySelector('.prev').onclick = () => show((current - 1 + slides.length) % slides.length);
    });
</script>
